{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/review.css' %}">
{% endblock %}

{% block content %}
    <div class="container py-5">
    <a href="{% url 'patterns_manage' %}" class="btn btn-outline-secondary mb-3">&larr; Back</a>
    <div class="card p-4 shadow-sm">
        <h3>Delete review</h3>
        <p>Are you sure you want to delete your review for <strong>{{ review.pattern.title }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button class="btn btn-danger">Delete</button>
            <a class="btn btn-outline-secondary" href="{% url 'pattern_detail' review.pattern.id %}">Cancel</a>
        </form>
    </div>
    </div>
{% endblock %}
